name: Deploy to DigitalOcean

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Droplet 1
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DROPLET1_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/uzteks-app
            git pull origin main
            npm install --production
            pm2 restart uzteks || pm2 start server.js --name uzteks
            pm2 save

      - name: Deploy to Droplet 2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DROPLET2_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/uzteks-app
            git pull origin main
            npm install --production
            pm2 restart uzteks || pm2 start server.js --name uzteks
            pm2 save
